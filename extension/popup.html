<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 16px; background: #0a0a0f; color: #e4e4f0; font-family: monospace; }
    h1 { font-size: 14px; color: #00f0ff; margin: 0 0 12px 0; }
    input { width: 100%; padding: 8px; background: #14141f; border: 1px solid #1e1e2e; color: #e4e4f0; border-radius: 6px; margin-bottom: 8px; }
    button { width: 100%; padding: 10px; background: #00f0ff; color: #0a0a0f; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    button:hover { background: #00c0cc; }
    #result { margin-top: 12px; padding: 12px; border-radius: 8px; display: none; }
    .clean { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); }
    .suspicious { background: rgba(255,184,0,0.1); border: 1px solid rgba(255,184,0,0.3); }
    .malicious { background: rgba(255,42,42,0.1); border: 1px solid rgba(255,42,42,0.3); }
    .critical { background: rgba(255,42,42,0.2); border: 1px solid rgba(255,42,42,0.5); }
  </style>
</head>
<body>
  <h1>PHISHPULSE v2.0</h1>
  <input type="text" id="urlInput" placeholder="Enter URL to scan...">
  <button id="scanBtn">SCAN TARGET</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
