<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PayPal - Log In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            background: #f7f9fa; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .logo { 
            width: 130px; 
            margin: 50px 0 30px; 
        }
        .box { 
            background: white; 
            width: 420px; 
            padding: 45px; 
            border-radius: 8px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); 
        }
        h2 { 
            font-size: 24px; 
            font-weight: 400; 
            color: #2c2e2f; 
            margin-bottom: 25px; 
            text-align: center; 
        }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 15px; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #0070ba; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 15px; 
        }
        button:hover { background: #005ea6; }
        .forgot { 
            display: block; 
            text-align: center; 
            margin-top: 18px; 
            color: #0070ba; 
            font-size: 14px; 
            text-decoration: none; 
        }
        .secure { 
            margin-top: 30px; 
            font-size: 12px; 
            color: #666; 
            text-align: center; 
        }
        .secure img { 
            width: 16px; 
            vertical-align: middle; 
            margin-right: 4px; 
        }
        .footer { 
            margin-top: 40px; 
            font-size: 11px; 
            color: #999; 
        }
    </style>
</head>
<body>
    <img class="logo" src="https://www.paypalobjects.com/webstatic/icon/pp258.png" alt="PayPal">
    <div class="box">
        <h2>Log in to your PayPal account</h2>
        <input type="email" placeholder="Email or mobile number">
        <input type="password" placeholder="Password">
        <button>Log In</button>
        <a href="#" class="forgot">Having trouble logging in?</a>
        <p class="secure">
            <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png"> 
            SSL Secure Connection
        </p>
    </div>
    <p class="footer">© 1999-2026 PayPal. All rights reserved.</p>
</body>
</html>
